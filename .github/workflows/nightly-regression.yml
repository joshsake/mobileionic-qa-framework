name: Nightly Regression

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC daily
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: nightly-regression
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  # Must match the API URL baked into src/environments/environment.ts by the
  # Ionic build. Running the mock server on any other port leaves the browser
  # calling a dead host.
  MOCK_SERVER_PORT: '3000'
  API_BASE_URL: 'http://localhost:3000'

jobs:
  api-regression:
    name: API Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/api/health" > /dev/null; then
              echo "Mock server ready after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Mock server did not become ready in 60s."
          exit 1

      - name: Run full API regression
        run: npx playwright test --project=api --retries=2
        working-directory: tests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: tests/reports/allure-results/
          retention-days: 30
          if-no-files-found: ignore

  web-regression:
    name: Web Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: web-chromium
            install: chromium
          - browser: firefox
            project: web-firefox
            install: firefox
          - browser: webkit
            project: web-webkit
            install: webkit
          - browser: mobile-chrome
            project: web-mobile-chrome
            install: chromium
          - browser: mobile-safari
            project: web-mobile-safari
            install: webkit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.install }}
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      # ng build defaults to the development configuration, which keeps the API
      # URL on localhost. A production build would bake in the public API host
      # and every request from the test browser would leave the runner.
      - name: Build Ionic app
        run: npm run build
        working-directory: app

      - name: Serve built app
        run: npx --yes serve -s dist/fitness-tracker/browser -l 4200 &
        working-directory: app

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/api/health" > /dev/null \
               && curl -sf http://localhost:4200 > /dev/null; then
              echo "App and mock server ready after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready in 60s."
          exit 1

      - name: Run web regression tests
        run: npx playwright test --project=${{ matrix.project }} --retries=2
        working-directory: tests
        env:
          BASE_URL: http://localhost:4200

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-failures-${{ matrix.browser }}
          path: tests/test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web-${{ matrix.browser }}
          path: tests/reports/allure-results/
          retention-days: 30
          if-no-files-found: ignore

  mobile-regression:
    name: Mobile Regression (${{ matrix.device }} / API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Emulator runs on hosted runners are inherently flaky: the AVD has to boot,
    # Gradle has to produce a debug APK and Appium has to attach. This job
    # reports its result without failing the nightly outright; the summary step
    # below still records the outcome.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # These are avdmanager device ids, not display names. "Pixel 6" fails
        # with "No device found matching --device Pixel 6".
        include:
          - device: pixel_6
            api-level: 33
          - device: pixel_6
            api-level: 34
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/e2e-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install mobile test dependencies
        run: npm ci
        working-directory: tests/e2e-mobile

      - name: Build Ionic app
        run: npm run build
        working-directory: app

      - name: Add Android platform via Capacitor
        run: npx cap add android || true
        working-directory: app

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: app

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: app

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      # Without this the emulator starts unaccelerated and the adb daemon never
      # comes up ("Unable to connect to adb daemon on port 5037", exit 224).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.device }}
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            cd tests/e2e-mobile
            npx wdio run ./wdio.conf.ts

      - name: Upload mobile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile-${{ matrix.device }}-api${{ matrix.api-level }}
          path: tests/reports/
          retention-days: 30
          if-no-files-found: ignore

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/mock-server/package-lock.json

      # k6 is not preinstalled on hosted runners. This job previously invoked it
      # directly, which is why it exited with code 2 without running a scenario.
      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/api/health" > /dev/null; then
              echo "Mock server ready after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Mock server did not become ready in 60s."
          exit 1

      # handleSummary() writes to a path relative to k6's working directory, and
      # k6 does not create missing directories for it. Since the steps below run
      # from tests/performance, the target is tests/performance/reports.
      - name: Create reports directory
        run: mkdir -p reports
        working-directory: tests/performance

      # The k6 scripts append /auth/login and /workouts to BASE_URL, so the
      # value passed here carries the /api prefix.
      - name: Run load test
        run: k6 run -e BASE_URL=$API_BASE_URL/api load-test.js
        working-directory: tests/performance

      - name: Run spike test
        run: k6 run -e BASE_URL=$API_BASE_URL/api spike-test.js
        working-directory: tests/performance

      - name: Upload performance summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-summaries
          path: tests/performance/reports/
          retention-days: 30
          if-no-files-found: ignore

  nightly-report:
    name: Generate Nightly Report
    needs: [api-regression, web-regression, mobile-regression, performance]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      # actions-gh-pages pushes a commit to the gh-pages branch. Without
      # contents:write that push fails with git exit code 128.
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate combined Allure report
        run: |
          if [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "No Allure results were produced; skipping report generation."
            exit 0
          fi
          allure generate allure-results --clean -o allure-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: nightly-report

      - name: Summarise results
        run: |
          {
            echo "### Nightly Regression Summary"
            echo ""
            echo "| Suite | Result |"
            echo "| --- | --- |"
            echo "| API | ${{ needs.api-regression.result }} |"
            echo "| Web | ${{ needs.web-regression.result }} |"
            echo "| Mobile (advisory) | ${{ needs.mobile-regression.result }} |"
            echo "| Performance | ${{ needs.performance.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Posts only when a blocking suite fails. Mobile is advisory and is
      # deliberately excluded. The step is skipped when SLACK_WEBHOOK_URL is
      # unset so forks without the secret do not fail here.
      - name: Notify Slack on failure
        if: >
          (needs.api-regression.result == 'failure' ||
           needs.web-regression.result == 'failure' ||
           needs.performance.result == 'failure')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Nightly regression failed on ${GITHUB_REF_NAME}. API: ${{ needs.api-regression.result }}, Web: ${{ needs.web-regression.result }}, Perf: ${{ needs.performance.result }}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"
