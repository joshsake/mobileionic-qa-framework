name: Nightly Regression

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC daily
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: nightly-regression
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0'

jobs:
  api-regression:
    name: API Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('api/dotnet-api/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: 5000

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:5000/api/health && break
            sleep 2
          done

      - name: Run full API regression
        run: npx playwright test --project=api --retries=2
        working-directory: tests
        env:
          API_BASE_URL: http://localhost:5000/api

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-api
          path: tests/reports/allure-results/
          retention-days: 30

  web-regression:
    name: Web Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit, mobile-chrome, mobile-safari]
        include:
          - browser: chromium
            project: web-chromium
          - browser: firefox
            project: web-firefox
          - browser: webkit
            project: web-webkit
          - browser: mobile-chrome
            project: web-mobile-chrome
          - browser: mobile-safari
            project: web-mobile-safari
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: 5000

      - name: Build and serve Ionic app
        run: |
          npm run build
          npx serve -s dist/fitness-tracker/browser -l 4200 &
        working-directory: app

      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:4200 && curl -s http://localhost:5000/api/health && break
            sleep 2
          done

      - name: Run web regression tests
        run: npx playwright test --project=${{ matrix.project }} --retries=2
        working-directory: tests
        env:
          BASE_URL: http://localhost:4200
          API_BASE_URL: http://localhost:5000/api

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-screenshots-${{ matrix.browser }}
          path: tests/reports/screenshots/
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-web-${{ matrix.browser }}
          path: tests/reports/allure-results/
          retention-days: 30

  mobile-regression:
    name: Mobile Regression (${{ matrix.device }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: Pixel 6
            api-level: 33
            profile: Pixel 6
          - device: Pixel 7
            api-level: 34
            profile: Pixel 7
          - device: Pixel 8
            api-level: 34
            profile: Pixel 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/e2e-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install mobile test dependencies
        run: npm ci
        working-directory: tests/e2e-mobile

      - name: Build Ionic app
        run: npm run build
        working-directory: app

      - name: Add Android platform
        run: npx cap add android || true
        working-directory: app

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: app

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: app

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: 5000

      - name: Run Appium tests on ${{ matrix.device }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.profile }}
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            cd tests/e2e-mobile
            npx wdio run ./wdio.conf.ts

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-appium-logs-${{ matrix.device }}
          path: tests/reports/appium-logs/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-mobile-screenshots-${{ matrix.device }}
          path: tests/reports/screenshots/
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-mobile-${{ matrix.device }}
          path: tests/reports/allure-results/
          retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: 5000

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:5000/api/health && break
            sleep 2
          done

      - name: Run load test
        run: k6 run tests/performance/load-test.js
        env:
          BASE_URL: http://localhost:5000/api

      - name: Run spike test
        run: k6 run tests/performance/spike-test.js
        env:
          BASE_URL: http://localhost:5000/api

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-performance-results
          path: reports/
          retention-days: 30

  generate-nightly-report:
    name: Generate Nightly Report
    needs: [api-regression, web-regression, mobile-regression, performance-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-allure-*
          path: allure-results
          merge-multiple: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate combined nightly report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy nightly report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: nightly-report

  notify-on-failure:
    name: Notify on Failure
    needs: [api-regression, web-regression, mobile-regression, performance-tests]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Determine failed jobs
        id: failures
        run: |
          FAILED_JOBS=""
          if [ "${{ needs.api-regression.result }}" == "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}API Regression, "
          fi
          if [ "${{ needs.web-regression.result }}" == "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Web Regression, "
          fi
          if [ "${{ needs.mobile-regression.result }}" == "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Mobile Regression, "
          fi
          if [ "${{ needs.performance-tests.result }}" == "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Performance Tests, "
          fi
          echo "failed_jobs=${FAILED_JOBS%%, }" >> $GITHUB_OUTPUT

      - name: Send Slack notification (stub)
        run: |
          echo "========================================"
          echo "NIGHTLY REGRESSION FAILURE NOTIFICATION"
          echo "========================================"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Failed Jobs: ${{ steps.failures.outputs.failed_jobs }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "To enable Slack notifications, add a SLACK_WEBHOOK_URL secret"
          echo "and uncomment the curl command below."
          echo ""
          # Uncomment and configure to enable Slack notifications:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{
          #     \"text\": \":rotating_light: *Nightly Regression Failed*\",
          #     \"blocks\": [
          #       {
          #         \"type\": \"header\",
          #         \"text\": {\"type\": \"plain_text\", \"text\": \"Nightly Regression Failed\"}
          #       },
          #       {
          #         \"type\": \"section\",
          #         \"fields\": [
          #           {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n${{ github.repository }}\"},
          #           {\"type\": \"mrkdwn\", \"text\": \"*Failed Jobs:*\n${{ steps.failures.outputs.failed_jobs }}\"}
          #         ]
          #       },
          #       {
          #         \"type\": \"actions\",
          #         \"elements\": [
          #           {
          #             \"type\": \"button\",
          #             \"text\": {\"type\": \"plain_text\", \"text\": \"View Run\"},
          #             \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          #           }
          #         ]
          #       }
          #     ]
          #   }" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
