name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0'
  # The Ionic build bakes in src/environments/environment.ts, which points at
  # http://localhost:3000/api. The mock server must therefore listen on 3000 in
  # CI too - running it anywhere else leaves the browser calling a dead port.
  MOCK_SERVER_PORT: '3000'
  API_BASE_URL: 'http://localhost:3000'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      # ESLint 9 uses flat config (tests/eslint.config.mjs) and no longer
      # accepts --ext; the file globs come from the config itself.
      - name: Run ESLint on tests
        run: npx eslint . --max-warnings 0
        working-directory: tests

      # The app has no ESLint setup, so it is gated on the compiler instead of
      # a lint step that would fail for want of a config file.
      - name: TypeScript type check (app)
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: app

      - name: TypeScript type check (tests)
        run: npx tsc --noEmit --project tsconfig.json
        working-directory: tests

  api-tests:
    name: API Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      # Poll the readiness endpoint and fail fast if it never comes up, rather
      # than falling through to a test run that would report confusing
      # connection errors instead of "the server never started".
      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/api/health" > /dev/null; then
              echo "Mock server ready after ${i} attempt(s)."
              exit 0
            fi
            echo "Waiting for mock server... ($i/30)"
            sleep 2
          done
          echo "Mock server did not become ready in 60s."
          exit 1

      - name: Run API tests
        run: npx playwright test --project=api
        working-directory: tests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: tests/reports/allure-results/
          retention-days: 14
          if-no-files-found: ignore

  e2e-web-tests:
    name: E2E Web Tests (${{ matrix.browser }})
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: web-chromium
          - browser: firefox
            project: web-firefox
          - browser: mobile-chrome
            project: web-mobile-chrome
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser == 'firefox' && 'firefox' || 'chromium' }}
        working-directory: tests

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      # ng build defaults to the development configuration, which keeps the API
      # URL pointing at localhost. Building "production" here would bake in the
      # public API host and every request from the test browser would leave the
      # runner.
      - name: Build Ionic app
        run: npm run build
        working-directory: app

      - name: Serve built app
        run: npx --yes serve -s dist/fitness-tracker/browser -l 4200 &
        working-directory: app

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/api/health" > /dev/null \
               && curl -sf http://localhost:4200 > /dev/null; then
              echo "App and mock server ready after ${i} attempt(s)."
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "Services did not become ready in 60s."
          exit 1

      - name: Run E2E web tests
        run: npx playwright test --project=${{ matrix.project }}
        working-directory: tests
        env:
          BASE_URL: http://localhost:4200

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: tests/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web-${{ matrix.browser }}
          path: tests/reports/allure-results/
          retention-days: 14
          if-no-files-found: ignore

  e2e-mobile-tests:
    name: E2E Mobile Tests (Android)
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Advisory, not a merge gate. The Android emulator job needs a Capacitor
    # platform to be generated, a Gradle debug build and a booted AVD; any of
    # those can fail for reasons unrelated to the change under review. It runs
    # so the results are visible, but a red emulator does not block a PR.
    # Track the Appium suite's real signal in the nightly regression run.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            api/mock-server/package-lock.json
            tests/e2e-mobile/package-lock.json

      - name: Setup Java (for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Install mock server dependencies
        run: npm ci
        working-directory: api/mock-server

      - name: Install mobile test dependencies
        run: npm ci
        working-directory: tests/e2e-mobile

      - name: Build Ionic app
        run: npm run build
        working-directory: app

      - name: Add Android platform via Capacitor
        run: npx cap add android || true
        working-directory: app

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: app

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: app

      - name: Start mock server
        run: npm start &
        working-directory: api/mock-server
        env:
          PORT: ${{ env.MOCK_SERVER_PORT }}

      # Without this the emulator starts without hardware acceleration and the
      # adb daemon never comes up ("Unable to connect to adb daemon on port
      # 5037", exit 224). The KVM device exists on the runner but is not
      # world-accessible until this udev rule is applied.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          # avdmanager --device takes a device id, not a display name. "Pixel 6"
          # fails with "No device found matching --device Pixel 6"; the id is
          # lowercase and underscored.
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            cd tests/e2e-mobile
            npx wdio run ./wdio.conf.ts

      - name: Upload mobile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: tests/reports/
          retention-days: 14
          if-no-files-found: ignore

  generate-report:
    name: Generate Combined Report
    needs: [api-tests, e2e-web-tests, e2e-mobile-tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      # actions-gh-pages pushes a commit to the gh-pages branch, so it needs
      # write access to repository contents. Without it the push fails with
      # git exit code 128.
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate combined Allure report
        run: |
          if [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "No Allure results were produced; skipping report generation."
            exit 0
          fi
          allure generate allure-results --clean -o allure-report

      - name: Upload combined report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: qa-report
